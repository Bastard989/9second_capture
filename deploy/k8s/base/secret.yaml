apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
type: Opaque
stringData:
  # Пример:
  # postgres_dsn: "postgresql+psycopg://agent_user:strong_password@postgres:5432/agent"
  # redis_url: "redis://redis:6379/0"
  postgres_dsn: "postgresql+psycopg://<DB_USER>:<DB_PASSWORD>@<DB_HOST>:<DB_PORT>/<DB_NAME>"
  redis_url: "redis://<REDIS_HOST>:<REDIS_PORT>/<REDIS_DB>"
  api_keys: ""
  service_api_keys: ""
  jwt_shared_secret: ""
  sberjazz_api_token: ""
